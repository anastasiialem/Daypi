name: Deploy Daypi to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          script: |
            # 1. Navigate to the repository root
            cd /var/www/daypi


            # 2. Force the server to exactly match the main branch on GitHub
            git fetch --all
            git reset --hard origin/main

            # 3. Navigate into the Django project directory
            cd Daypi

            # 4. Use the absolute path to the virtual environment (bypasses the 'source' command entirely)
            /var/www/daypi/Daypi/venv/bin/pip install -r requirements.txt
            /var/www/daypi/Daypi/venv/bin/python manage.py migrate
            /var/www/daypi/Daypi/venv/bin/python manage.py collectstatic --noinput

            # 5. Restart the server to apply changes
            sudo systemctl restart daypi
